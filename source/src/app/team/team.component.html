<div class="team-container container">
  <div class="team-box">
    <div class="team-content">
      <div class="left-section">
      </div>
      <div class="right-section">
        <div class="name-container">
          <h1 id="name">Justin</h1>
          <span id="role">Front-End Developer Back-End Developer</span><br>
          <span class="name-description" id="description">
              Justin is an intermediate full stack Web developer.
          </span>
        </div>
        <div id="skill-container" class="skills-set-container justin" style="color:white;">
            <div class="skills-wrapper">
              <div class="skill html">
                <span class="skill-title">HTML / CSS</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill php">
                <span class="skill-title">PHP</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill laravel">
                <span class="skill-title">Laravel</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill mysql">
                <span class="skill-title">MySQL</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill jsjq">
                <span class="skill-title">JavaScript & JQuery</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill reactjs">
                <span class="skill-title">ReactJS</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill angular">
                <span class="skill-title">Angular</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill wordpress">
                <span class="skill-title">WordPress</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill xd">
                <span class="skill-title">Adobe XD</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill illustrator">
                <span class="skill-title">Adobe Illustrator</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill photoshop">
                <span class="skill-title">Adobe Photoshop</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
              <div class="skill ae">
                <span class="skill-title">Adobe After Effects</span>
                <div class="skill-experience-bar"><div class="bar"></div></div>
              </div>
            </div>
          </div>
          <div class="member-navigation">
            <a (click)="previousMember()" class="previous">
              <i  class="icon-previous"></i>
              <!-- <span>Previous Member</span>  -->
            </a>
            <a (click)="nextMember()" class="next">
              <i  class="icon-next"></i>
              <!-- <span>Next Member</span> -->
            </a>
          </div>
      </div>
    </div>
  </div>
  <div class="member-picture" id="member-image">
    <img src="../../assets/images/Members/justin.png">
  </div>
</div>
<div class="footer">
  <img routerLink="/home" class="footer-logo" src="../../assets/images/logo_footer.svg"/>
</div>
